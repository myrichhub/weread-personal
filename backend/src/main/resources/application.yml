server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/weread?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  mvc:
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-change-in-production-min-32-chars}
    expiration-ms: 604800000 # 7 days
  weread:
    base-url: https://weread.qq.com
